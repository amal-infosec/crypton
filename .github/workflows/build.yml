name: Build & Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev zip libasound2-dev libmpv-dev
      
      - name: Enable Linux support
        run: flutter config --enable-linux-desktop
        
      - name: Resolve dependencies
        run: flutter pub get

      - name: Build Linux Release
        run: flutter build linux --release
        
      - name: Create Linux Bundle Zip
        run: |
          mkdir -p build/linux/x64/release/bundle/linux
          cp linux/crypton.desktop build/linux/x64/release/bundle/linux/
          cp linux/uninstall.sh build/linux/x64/release/bundle/linux/
          cp linux/install.sh build/linux/x64/release/bundle/
          cd build/linux/x64/release/bundle
          zip -r ../../../../../crypton-linux.zip .
          cd ../../../../../
          ls -lh crypton-linux.zip
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: crypton-linux
          path: crypton-linux.zip

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Resolve dependencies
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release
        
      - name: Create MSIX
        run: dart run msix:create --install-certificate false
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: crypton-windows
          path: build/windows/x64/runner/Release/crypton.msix
